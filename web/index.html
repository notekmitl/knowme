<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="KnowMe — self-understanding through astrology, personality, and narrative.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KnowMe">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>KnowMe</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /*
      Applied only when Thai Beta Report screenshot mode is active.
      Lets GoFullPage scroll the document instead of a nested Flutter viewport.
    */
    html.screenshot-friendly,
    html.screenshot-friendly body {
      height: auto !important;
      min-height: 100% !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
    }
    html.screenshot-friendly flt-glass-pane,
    html.screenshot-friendly flutter-view,
    html.screenshot-friendly flt-scene-host,
    html.screenshot-friendly #flutter_target {
      height: auto !important;
      min-height: var(--thai-beta-report-content-height, 100vh) !important;
      overflow: visible !important;
      overflow-y: visible !important;
      contain: none !important;
    }
  </style>
</head>
<body>
  <!--
    Production-first QA: the Flutter service worker is intentionally DISABLED.

    The SW (deprecated in this Flutter version) is the reason a freshly deployed
    build required Ctrl+Shift+R / incognito to appear. With no SW registered,
    index.html + main.dart.js are always fetched fresh (both are served
    `no-cache` by firebase.json), so the latest production build activates
    automatically on the next normal page load.

    The inline script below also removes any previously-installed worker and its
    caches for returning users, so existing devices self-heal once.
  -->
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister();
            });
          })
          .catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys()
          .then(function (keys) {
            keys.forEach(function (key) { caches.delete(key); });
          })
          .catch(function () {});
      }
    })();
  </script>

  <script>
  window.__syncThaiBetaScreenshotHost = function (heightPx) {
    var minHeight = Math.max(heightPx || 0, window.innerHeight || 0);
    var heightValue = minHeight + 'px';
    document.documentElement.style.setProperty(
      '--thai-beta-report-content-height',
      heightValue
    );
    var selectors = ['body', 'flt-glass-pane', 'flutter-view', 'flt-scene-host', '#flutter_target'];
    selectors.forEach(function (selector) {
      document.querySelectorAll(selector).forEach(function (el) {
        el.style.setProperty('height', 'auto', 'important');
        el.style.setProperty('min-height', heightValue, 'important');
        el.style.setProperty('overflow', 'visible', 'important');
        el.style.setProperty('overflow-y', 'visible', 'important');
        el.style.setProperty('contain', 'none', 'important');
      });
    });
  };
  </script>

  <!--
    Standard Flutter bootstrap: flutter_bootstrap.js carries the correct
    `_flutter.buildConfig` + entrypoint, so the engine always boots. The inline
    script above unregisters any service worker and clears its caches on every
    load, so a returning user self-heals to the freshly deployed build, and new
    users never keep a persistent worker. Combined with the `no-cache` headers
    in firebase.json, the latest build activates on a normal load — no
    Ctrl+Shift+R / incognito needed.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
